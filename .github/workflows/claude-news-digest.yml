name: Claude News Daily Digest

on:
  schedule:
    # Runs every day at 8:00 AM UTC
    - cron: '0 8 * * *'
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write

jobs:
  generate-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Generate Claude news digest
        run: python .github/scripts/generate_claude_digest.py

      - name: Commit updated digest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CLAUDE_NEWS_DIGEST.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily Claude news digest $(date -u '+%Y-%m-%d')"
            git push
          fi
